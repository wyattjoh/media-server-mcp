version: '3.8'

services:
  media-server-mcp:
    build: .
    container_name: media-server-mcp
    restart: unless-stopped
    environment:
      # Radarr Configuration (optional)
      - RADARR_URL=${RADARR_URL}
      - RADARR_API_KEY=${RADARR_API_KEY}
      
      # Sonarr Configuration (optional)
      - SONARR_URL=${SONARR_URL}
      - SONARR_API_KEY=${SONARR_API_KEY}
      
      # TMDB Configuration (optional)
      - TMDB_API_KEY=${TMDB_API_KEY}
      
      # Plex Configuration (optional)
      - PLEX_URL=${PLEX_URL}
      - PLEX_API_KEY=${PLEX_API_KEY}
      
      # Authentication (required for SSE mode)
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      
      # Tool Configuration (optional)
      - TOOL_PROFILE=${TOOL_PROFILE:-default}
      - TOOL_BRANCHES=${TOOL_BRANCHES}
      - TOOL_EXCLUDE=${TOOL_EXCLUDE}
      - TOOL_INCLUDE=${TOOL_INCLUDE}
      
      # Debug Configuration
      - DEBUG_MODE=${DEBUG_MODE:-false}
    
    # Port mapping for SSE mode
    ports:
      - "3000:3000"
    
    # Volume mounts for persistence
    volumes:
      - media-server-mcp-logs:/app/logs
      - media-server-mcp-config:/app/config
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for persistence
volumes:
  media-server-mcp-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/logs
  media-server-mcp-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/config

